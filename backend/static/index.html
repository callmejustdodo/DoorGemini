<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI Doorbell</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Camera section — fullscreen */
    .camera-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #111;
    }
    #camera-feed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    canvas { display: none; }

    /* Subtitle overlay */
    .subtitle-overlay {
      position: absolute;
      bottom: 80px;
      left: 0; right: 0;
      text-align: center;
      padding: 0 16px;
      pointer-events: none;
    }
    .subtitle {
      display: inline-block;
      background: rgba(0,0,0,0.7);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 16px;
      line-height: 1.4;
      max-width: 90%;
      transition: opacity 0.3s;
    }
    .subtitle.ai { border-left: 3px solid #4fc3f7; }
    .subtitle.visitor { border-left: 3px solid #81c784; }

    /* Status bar */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0; right: 0;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(rgba(0,0,0,0.6), transparent);
      font-size: 14px;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #4caf50;
    }
    .status-dot.active { background: #f44336; animation: pulse 1.5s infinite; }
    .status-dot.caution { background: #ff9800; animation: pulse 0.8s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Controls — floating over camera */
    .controls {
      position: fixed;
      bottom: 32px;
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
    }
    .btn {
      border: none;
      border-radius: 50%;
      width: 56px; height: 56px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s;
    }
    .btn:active { transform: scale(0.92); }
    .btn-start {
      display: none;
    }
    .btn-start.active { display: none; }
    .btn-mic {
      background: #333;
      color: white;
    }
    .btn-mic.muted { background: #f44336; }

    /* Notification log — floating overlay at top, hidden when empty */
    .notification-log {
      position: fixed;
      top: 48px;
      left: 8px; right: 8px;
      max-height: 150px;
      overflow-y: auto;
      padding: 8px 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 12px;
      z-index: 10;
      display: none;
    }
    .notification-log.has-items { display: block; }
    .notification-item {
      padding: 8px 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 13px;
      display: flex;
      gap: 8px;
    }
    .notification-item .time { color: #666; min-width: 50px; }
    .notification-item .msg { color: #ccc; }

    /* Tool call indicator stack */
    .tool-stack {
      position: absolute;
      bottom: 130px;
      left: 0; right: 0;
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }
    .tool-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.75);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      color: #aaa;
      opacity: 0;
      transform: translateY(8px);
      animation: pillIn 0.25s ease forwards;
    }
    @keyframes pillIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .tool-pill.fade-out {
      animation: pillOut 0.3s ease forwards;
    }
    @keyframes pillOut {
      to { opacity: 0; transform: translateY(-8px); }
    }
    .tool-pill.success { color: #81c784; }
    .tool-pill.fail { color: #ef9a9a; }
    .tool-spinner {
      width: 14px; height: 14px;
      border: 2px solid #555;
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error banner */
    .error-banner {
      display: none;
      background: #d32f2f;
      color: white;
      padding: 8px 16px;
      font-size: 13px;
      text-align: center;
    }
    .error-banner.visible { display: block; }
  </style>
</head>
<body>

<div class="error-banner" id="error-banner"></div>

<div class="camera-container">
  <video id="camera-feed" autoplay playsinline muted></video>
  <canvas id="capture-canvas"></canvas>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Idle</span>
  </div>

  <div class="tool-stack" id="tool-stack"></div>

  <div class="subtitle-overlay">
    <div class="subtitle" id="subtitle" style="display:none;"></div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-start" id="btn-start" title="Start">&#x25b6;</button>
</div>

<div class="notification-log" id="notification-log"></div>

<script>
(function() {
  'use strict';

  // DOM elements
  const video = document.getElementById('camera-feed');
  const canvas = document.getElementById('capture-canvas');
  const ctx = canvas.getContext('2d');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const subtitleEl = document.getElementById('subtitle');
  const btnStart = document.getElementById('btn-start');
  const notifLog = document.getElementById('notification-log');
  const errorBanner = document.getElementById('error-banner');
  const toolStack = document.getElementById('tool-stack');
  const toolPills = {};  // tool name -> pill element

  // State
  let ws = null;
  let audioCtx = null;
  let playbackCtx = null;
  let captureNode = null;
  let playbackNode = null;
  let mediaStream = null;
  let isRunning = false;
  let isMuted = false;
  let videoIntervalId = null;
  let subtitleTimeout = null;

  // Frame prefixes
  const FRAME_AUDIO = 0x01;
  const FRAME_VIDEO = 0x02;
  const FRAME_CONTROL = 0x03;

  // --- UI Helpers ---

  function setStatus(status, text) {
    statusDot.className = 'status-dot' + (status !== 'idle' ? ' ' + status : '');
    statusText.textContent = text;
  }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.add('visible');
    setTimeout(() => errorBanner.classList.remove('visible'), 5000);
  }

  function showSubtitle(text, speaker) {
    subtitleEl.textContent = text;
    subtitleEl.className = 'subtitle ' + speaker;
    subtitleEl.style.display = 'inline-block';
    clearTimeout(subtitleTimeout);
    subtitleTimeout = setTimeout(() => {
      subtitleEl.style.display = 'none';
    }, 4000);
  }

  let notifHideTimeout = null;
  function addNotification(msg) {
    const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    const item = document.createElement('div');
    item.className = 'notification-item';
    item.innerHTML = '<span class="time">' + time + '</span><span class="msg">' + msg + '</span>';
    notifLog.prepend(item);
    notifLog.classList.add('has-items');
    // Keep max 20
    while (notifLog.children.length > 20) notifLog.removeChild(notifLog.lastChild);
    // Auto-hide after 3s
    clearTimeout(notifHideTimeout);
    notifHideTimeout = setTimeout(function() {
      notifLog.classList.remove('has-items');
    }, 3000);
  }

  // --- Media Capture ---

  async function startMedia() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 },
        video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 }, zoom: { ideal: 0.5 } }
      });
      video.srcObject = mediaStream;
    } catch (e) {
      showError('Camera/mic access denied: ' + e.message);
      throw e;
    }
  }

  function stopMedia() {
    if (mediaStream) {
      mediaStream.getTracks().forEach(t => t.stop());
      mediaStream = null;
    }
    video.srcObject = null;
  }

  // --- Audio Capture via AudioWorklet ---

  async function startAudioCapture() {
    audioCtx = new AudioContext({ sampleRate: 16000 });
    await audioCtx.audioWorklet.addModule('/static/audio-worklet-processor.js');

    const source = audioCtx.createMediaStreamSource(mediaStream);
    captureNode = new AudioWorkletNode(audioCtx, 'capture-processor');

    captureNode.port.onmessage = (e) => {
      if (!isRunning || isMuted || !ws || ws.readyState !== WebSocket.OPEN) return;
      const pcmData = new Uint8Array(e.data);
      const frame = new Uint8Array(1 + pcmData.length);
      frame[0] = FRAME_AUDIO;
      frame.set(pcmData, 1);
      ws.send(frame.buffer);
    };

    source.connect(captureNode);
    captureNode.connect(audioCtx.destination); // Required for processing
  }

  // --- Audio Playback via AudioWorklet (separate 24kHz context) ---

  async function startAudioPlayback() {
    playbackCtx = new AudioContext({ sampleRate: 24000 });
    await playbackCtx.audioWorklet.addModule('/static/audio-worklet-processor.js');
    playbackNode = new AudioWorkletNode(playbackCtx, 'playback-processor');
    playbackNode.connect(playbackCtx.destination);
  }

  function playAudio(pcmData) {
    if (playbackNode) {
      playbackNode.port.postMessage(pcmData, [pcmData]);
    }
  }

  function clearAudioQueue() {
    if (playbackNode) {
      playbackNode.port.postMessage('clear');
    }
  }

  // --- Video Frame Capture ---

  function startVideoCapture() {
    const FPS = 5;
    videoIntervalId = setInterval(() => {
      if (!isRunning || !ws || ws.readyState !== WebSocket.OPEN) return;
      if (!video.videoWidth) return;

      canvas.width = 320;
      canvas.height = 240;
      ctx.drawImage(video, 0, 0, 320, 240);

      canvas.toBlob((blob) => {
        if (!blob) return;
        blob.arrayBuffer().then((buf) => {
          const jpegData = new Uint8Array(buf);
          const frame = new Uint8Array(1 + jpegData.length);
          frame[0] = FRAME_VIDEO;
          frame.set(jpegData, 1);
          ws.send(frame.buffer);
        });
      }, 'image/jpeg', 0.5);
    }, 1000 / FPS);
  }

  function stopVideoCapture() {
    if (videoIntervalId) {
      clearInterval(videoIntervalId);
      videoIntervalId = null;
    }
  }

  // --- WebSocket ---

  function connectWebSocket() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = protocol + '//' + location.host + '/ws/doorbell';

    ws = new WebSocket(url);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      setStatus('active', 'Connected');
    };

    ws.onmessage = (e) => {
      if (!(e.data instanceof ArrayBuffer) || e.data.byteLength < 2) return;

      const view = new Uint8Array(e.data);
      const frameType = view[0];
      const payload = e.data.slice(1);

      if (frameType === FRAME_AUDIO) {
        playAudio(payload);
      } else if (frameType === FRAME_CONTROL) {
        try {
          const msg = JSON.parse(new TextDecoder().decode(payload));
          handleControlMessage(msg);
        } catch (err) {
          // ignore malformed control
        }
      }
    };

    ws.onclose = () => {
      setStatus('idle', 'Disconnected');
      if (isRunning) {
        addNotification('Connection lost. Reconnecting...');
        setTimeout(connectWebSocket, 2000);
      }
    };

    ws.onerror = () => {
      showError('WebSocket connection error');
    };
  }

  function showToolIndicator(label, toolName) {
    var pill = document.createElement('div');
    pill.className = 'tool-pill';
    pill.innerHTML = '<div class="tool-spinner"></div><span>' + label + '</span>';
    toolStack.appendChild(pill);
    if (toolName) toolPills[toolName] = pill;
    // Auto-remove loading pills after 8s if no result arrives
    pill._timeout = setTimeout(function() { removePill(pill, toolName); }, 8000);
  }

  function showToolResult(label, status, toolName) {
    var icon = status === 'success' ? '\u2714' : '\u2718';
    // Update existing pill or create new one
    var pill = toolName && toolPills[toolName];
    if (pill) {
      clearTimeout(pill._timeout);
      pill.querySelector('.tool-spinner').remove();
      pill.querySelector('span').textContent = icon + ' ' + label;
      pill.classList.add(status === 'success' ? 'success' : 'fail');
    } else {
      pill = document.createElement('div');
      pill.className = 'tool-pill ' + (status === 'success' ? 'success' : 'fail');
      pill.innerHTML = '<span>' + icon + ' ' + label + '</span>';
      toolStack.appendChild(pill);
    }
    // Fade out after 3s
    pill._timeout = setTimeout(function() { removePill(pill, toolName); }, 3000);
  }

  function removePill(pill, toolName) {
    clearTimeout(pill._timeout);
    pill.classList.add('fade-out');
    pill.addEventListener('animationend', function() { pill.remove(); });
    if (toolName && toolPills[toolName] === pill) delete toolPills[toolName];
  }

  function hideAllToolIndicators() {
    Array.from(toolStack.children).forEach(function(pill) {
      pill.classList.add('fade-out');
      pill.addEventListener('animationend', function() { pill.remove(); });
    });
    Object.keys(toolPills).forEach(function(k) { delete toolPills[k]; });
  }

  function handleControlMessage(msg) {
    switch (msg.type) {
      case 'tool_call':
        showToolIndicator(msg.label || msg.tool, msg.tool);
        break;

      case 'tool_result':
        showToolResult(msg.label, msg.status, msg.tool);
        break;

      case 'subtitle':
        hideAllToolIndicators();
        showSubtitle(msg.text, msg.speaker);
        break;

      case 'notification':
        if (msg.data && msg.data.summary) {
          addNotification(msg.data.summary);
        }
        break;

      case 'status':
        if (msg.status === 'caution') {
          setStatus('caution', 'Caution');
        } else if (msg.status === 'active') {
          setStatus('active', 'In Conversation');
        } else if (msg.status === 'interrupted') {
          setStatus('active', 'Listening...');
        } else if (msg.status === 'idle') {
          setStatus('idle', 'Idle');
        }
        break;

      case 'session_state':
        if (msg.connected) {
          setStatus('active', 'Session Active');
        } else {
          setStatus('idle', msg.resumable ? 'Reconnecting...' : 'Disconnected');
        }
        break;

      case 'ping':
        sendControl('pong');
        break;

      case 'error':
        showError(msg.message || 'Unknown error');
        break;
    }
  }

  function sendControl(action) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const json = JSON.stringify({ action });
    const encoded = new TextEncoder().encode(json);
    const frame = new Uint8Array(1 + encoded.length);
    frame[0] = FRAME_CONTROL;
    frame.set(encoded, 1);
    ws.send(frame.buffer);
  }

  // --- Start / Stop ---

  async function start() {
    try {
      await startMedia();
      await startAudioCapture();
      await startAudioPlayback();
      connectWebSocket();
      startVideoCapture();

      isRunning = true;
      btnStart.innerHTML = '&#x23f9;';
      btnStart.classList.add('active');
      setStatus('active', 'Starting...');
    } catch (e) {
      showError('Failed to start: ' + e.message);
    }
  }

  function stop() {
    isRunning = false;
    sendControl('stop');
    stopVideoCapture();

    if (ws) {
      ws.close();
      ws = null;
    }
    if (captureNode) {
      captureNode.disconnect();
      captureNode = null;
    }
    if (playbackNode) {
      playbackNode.disconnect();
      playbackNode = null;
    }
    if (audioCtx) {
      audioCtx.close();
      audioCtx = null;
    }
    if (playbackCtx) {
      playbackCtx.close();
      playbackCtx = null;
    }
    stopMedia();
    clearAudioQueue();

    btnStart.innerHTML = '&#x25b6;';
    btnStart.classList.remove('active');
    isMuted = false;
    setStatus('idle', 'Idle');
  }

  // --- Event Listeners ---

  btnStart.addEventListener('click', () => {
    if (isRunning) {
      stop();
    } else {
      start();
    }
  });

  // Auto-start on page load
  start();


})();
</script>
</body>
</html>
